<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutobotEx 자동매매 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #1a1a2e;
      color: #e8e8f0;
      padding: 16px;
      min-height: 100vh;
      font-size: 16px;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 {
      font-size: 20px; margin-bottom: 12px; color: #b8b8d0;
      border-left: 3px solid #4a90e2; padding-left: 12px;
    }
    .sub-date { font-size: 14px; color: #8a8aa3; margin-bottom: 24px; }
    section { margin-bottom: 32px; }

    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }

    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .card .label { font-size: 15px; color: #8a8aa3; margin-bottom: 8px; }
    .card .value { font-size: 28px; font-weight: 700; }
    .summary-grid .card .value { font-size: 32px; }
    .card .row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 8px 0; font-size: 15px;
    }
    .card .row .k { color: #8a8aa3; }
    .card .row .v { font-weight: 600; }
    .card .row .v .sub { color: #8a8aa3; font-weight: 400; margin-left: 6px; }

    .pos { color: #4ade80; }
    .neg { color: #f87171; }
    .zero { color: #8a8aa3; }
    .neutral { color: #e8e8f0; }

    .badge {
      display: inline-block; padding: 6px 14px; border-radius: 14px;
      font-size: 16px; font-weight: 700;
    }
    .badge-attack { background: #be185d; color: #fff; }
    .badge-defense { background: #1e40af; color: #fff; }

    .diff-row {
      margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a3656;
      display: flex; justify-content: space-between; align-items: center; font-size: 15px;
    }
    .diff-row .k { color: #8a8aa3; }
    .diff-row .v { font-weight: 700; }

    .chart-card { background: #16213e; border-radius: 10px; padding: 20px; }
    .chart-wrap { position: relative; height: 360px; }

    .table-wrap {
      background: #16213e; border-radius: 10px; padding: 8px;
      max-height: 480px; overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    table th, table td {
      font-size: 14px; padding: 12px 10px; text-align: right;
      border-bottom: 1px solid #2a3656; white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th {
      color: #8a8aa3; font-weight: 600; background: #1e2a4a;
      position: sticky; top: 0; z-index: 1;
    }
    .col-irp-signal { color: #6b7299; font-style: italic; }
    .empty { text-align: center; padding: 48px; color: #8a8aa3; font-size: 15px; }

    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      h2 { font-size: 17px; }
      .card .value { font-size: 22px; }
      .summary-grid .card .value { font-size: 24px; }
      table th, table td { font-size: 13px; padding: 8px 6px; }
      .chart-wrap { height: 260px; }
    }
  </style>
</head>
<body>
  <h1>AutobotEx 자동매매 대시보드</h1>
  <div class="sub-date" id="lastUpdated">로딩 중...</div>

  <section>
    <h2>전체 요약</h2>
    <div class="summary-grid grid grid-3">
      <div class="card"><div class="label">총 자산</div><div class="value neutral" id="totalAsset">-</div></div>
      <div class="card"><div class="label">일별 수익률</div><div class="value" id="dailyPct">-</div></div>
      <div class="card"><div class="label">일별 수익금</div><div class="value" id="dailyAmount">-</div></div>
      <div class="card"><div class="label">누적 수익률</div><div class="value" id="cumPct">-</div></div>
      <div class="card"><div class="label">누적 수익금</div><div class="value" id="cumAmount">-</div></div>
      <div class="card"><div class="label">현재 모드</div><div class="value"><span class="badge" id="modeBadge">-</span></div></div>
    </div>
  </section>

  <section>
    <h2>계좌별 현황</h2>
    <div class="grid grid-3" id="accountCards"></div>
  </section>

  <section>
    <h2>계좌별 누적 수익률</h2>
    <div class="chart-card"><div class="chart-wrap"><canvas id="accountChart"></canvas></div></div>
  </section>

  <section>
    <h2>일별 수익금</h2>
    <div class="table-wrap" id="dailyTableWrap"><div class="empty">로딩 중...</div></div>
  </section>

  <section>
    <h2>누적 수익금</h2>
    <div class="table-wrap" id="cumTableWrap"><div class="empty">로딩 중...</div></div>
  </section>

  <section>
    <h2>전략 비교 (Hybrid vs SmartSplit)</h2>
    <div class="chart-card"><div class="chart-wrap"><canvas id="strategyChart"></canvas></div></div>
  </section>

<script>
const fmtWon       = v => '₩' + Math.round(v).toLocaleString('ko-KR');
const fmtSignedWon = v => v === 0 ? '₩0' : (v > 0 ? '+' : '-') + '₩' + Math.abs(Math.round(v)).toLocaleString('ko-KR');
const fmtPct       = v => v === 0 ? '0.00%' : (v > 0 ? '+' : '') + v.toFixed(2) + '%';
const colorClass   = v => v > 0 ? 'pos' : (v < 0 ? 'neg' : 'zero');

// ISA/Pension: single value (auto-trading). IRP: actual + signal pair (manual).
// 합계는 IRP 실제(actual)만 합산. IRP 시그널은 별도 컬럼으로만 표시.
const totalActual = r =>
  r.ISA_hybrid + r.ISA_smartsplit +
  r.Pension_hybrid + r.Pension_smartsplit +
  r.IRP_hybrid_actual + r.IRP_safe_actual;

const irpActual = r => r.IRP_hybrid_actual + r.IRP_safe_actual;
const irpSignal = r => r.IRP_hybrid_signal + r.IRP_safe_signal;

// 6 columns used in tables: [ISA Hybrid, ISA Smart, 연금 Hybrid, 연금 Smart, IRP 실제, IRP 시그널]
const colsOf = r => [
  r.ISA_hybrid,
  r.ISA_smartsplit,
  r.Pension_hybrid,
  r.Pension_smartsplit,
  irpActual(r),
  irpSignal(r)
];
const initialColsOf = accs => [
  (accs.ISA?.initial || 0) * (accs.ISA?.hybrid_weight || 0),
  (accs.ISA?.initial || 0) * (accs.ISA?.smartsplit_weight || 0),
  (accs.Pension?.initial || 0) * (accs.Pension?.hybrid_weight || 0),
  (accs.Pension?.initial || 0) * (accs.Pension?.smartsplit_weight || 0),
  (accs.IRP?.initial || 0),
  (accs.IRP?.initial || 0)
];

async function load() {
  let data;
  try {
    const res = await fetch('data/daily.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    document.body.innerHTML =
      '<h1>AutobotEx 자동매매 대시보드</h1>' +
      '<div class="empty">data/daily.json을 불러올 수 없습니다.<br>' +
      'HTTP 서버로 열어주세요 (file:// 프로토콜은 fetch 차단).<br>' +
      '<small>오류: ' + e.message + '</small></div>';
    return;
  }

  const records = (data.daily_records || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  const accs = data.accounts || {};
  const initialTotal =
    (accs.ISA?.initial || 0) +
    (accs.Pension?.initial || 0) +
    (accs.IRP?.initial || 0);

  document.getElementById('lastUpdated').textContent =
    '마지막 업데이트: ' + (data.last_updated || '-');

  const mode = data.mode || '-';
  const badge = document.getElementById('modeBadge');
  badge.textContent = mode;
  badge.className = 'badge ' + (mode === '공격' ? 'badge-attack' : 'badge-defense');

  if (records.length === 0) {
    document.getElementById('totalAsset').textContent = fmtWon(initialTotal);
    ['dailyPct', 'dailyAmount', 'cumPct', 'cumAmount'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = '데이터 수집 중...';
      el.className = 'value zero';
    });
    renderAccountCards(accs, null);
    document.getElementById('dailyTableWrap').innerHTML = '<div class="empty">데이터 수집 중...</div>';
    document.getElementById('cumTableWrap').innerHTML   = '<div class="empty">데이터 수집 중...</div>';
    renderStrategyChart([], [], []);
    renderAccountChart([], [], [], [], []);
    return;
  }

  const last = records[records.length - 1];
  const prev = records.length > 1 ? records[records.length - 2] : null;
  const todayTotal = totalActual(last);

  // 첫날은 일별 = 0
  let dailyAmount = 0, dailyPct = 0;
  if (prev) {
    const prevTotal = totalActual(prev);
    dailyAmount = todayTotal - prevTotal;
    dailyPct = prevTotal ? (dailyAmount / prevTotal) * 100 : 0;
  }
  const cumAmount = todayTotal - initialTotal;
  const cumPct = initialTotal ? (cumAmount / initialTotal) * 100 : 0;

  document.getElementById('totalAsset').textContent = fmtWon(todayTotal);
  setSummary('dailyPct',    fmtPct(dailyPct),         dailyPct);
  setSummary('dailyAmount', fmtSignedWon(dailyAmount), dailyAmount);
  setSummary('cumPct',      fmtPct(cumPct),           cumPct);
  setSummary('cumAmount',   fmtSignedWon(cumAmount),  cumAmount);

  renderAccountCards(accs, last);
  renderProfitTable('dailyTableWrap', records, accs, 'daily');
  renderProfitTable('cumTableWrap',   records, accs, 'cumulative');

  const labels = records.map(r => r.date);

  const isaInit = accs.ISA?.initial || 0;
  const pensionInit = accs.Pension?.initial || 0;
  const irpInit = accs.IRP?.initial || 0;
  const hybridInit =
    isaInit * (accs.ISA?.hybrid_weight || 0) +
    pensionInit * (accs.Pension?.hybrid_weight || 0) +
    irpInit * (accs.IRP?.hybrid_weight || 0);
  const smartInit =
    isaInit * (accs.ISA?.smartsplit_weight || 0) +
    pensionInit * (accs.Pension?.smartsplit_weight || 0);

  // 종목 배치가 3계좌 동일하므로 Hybrid 시그널 선은 표시하지 않음 (실제 + SmartSplit 2개만)
  const hybridActualPct = records.map(r => {
    const v = r.ISA_hybrid + r.Pension_hybrid + r.IRP_hybrid_actual;
    return hybridInit ? ((v - hybridInit) / hybridInit) * 100 : 0;
  });
  const smartPct = records.map(r => {
    const v = r.ISA_smartsplit + r.Pension_smartsplit;
    return smartInit ? ((v - smartInit) / smartInit) * 100 : 0;
  });
  renderStrategyChart(labels, hybridActualPct, smartPct);

  const isaPct = records.map(r =>
    isaInit ? (((r.ISA_hybrid + r.ISA_smartsplit) - isaInit) / isaInit) * 100 : 0);
  const pensionPct = records.map(r =>
    pensionInit ? (((r.Pension_hybrid + r.Pension_smartsplit) - pensionInit) / pensionInit) * 100 : 0);
  const irpActualPct = records.map(r =>
    irpInit ? ((irpActual(r) - irpInit) / irpInit) * 100 : 0);
  const irpSignalPct = records.map(r =>
    irpInit ? ((irpSignal(r) - irpInit) / irpInit) * 100 : 0);
  renderAccountChart(labels, isaPct, pensionPct, irpActualPct, irpSignalPct);
}

function setSummary(id, text, raw) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'value ' + colorClass(raw);
}

function renderAccountCards(accs, last) {
  const wrap = document.getElementById('accountCards');
  wrap.innerHTML = '';

  const cards = [
    {
      key: 'ISA', label: 'ISA',
      subs: [
        { name: 'Hybrid',     field: 'ISA_hybrid',     weightKey: 'hybrid_weight'     },
        { name: 'SmartSplit', field: 'ISA_smartsplit', weightKey: 'smartsplit_weight' }
      ]
    },
    {
      key: 'Pension', label: '연금',
      subs: [
        { name: 'Hybrid',     field: 'Pension_hybrid',     weightKey: 'hybrid_weight'     },
        { name: 'SmartSplit', field: 'Pension_smartsplit', weightKey: 'smartsplit_weight' }
      ]
    },
    {
      key: 'IRP', label: 'IRP',
      subs: [
        { name: 'Hybrid',   field: 'IRP_hybrid_actual', weightKey: 'hybrid_weight' },
        { name: '안전자산', field: 'IRP_safe_actual',   weightKey: 'safe_weight'   }
      ]
    }
  ];

  cards.forEach(c => {
    const a = accs[c.key] || {};
    let body = `<div class="label">${c.label}</div>`;
    if (last) {
      const total = c.subs.reduce((s, x) => s + (last[x.field] || 0), 0);
      body += `<div class="value neutral">${fmtWon(total)}</div>`;
      c.subs.forEach(x => {
        const v = last[x.field] || 0;
        const init = (a.initial || 0) * (a[x.weightKey] || 0);
        const profit = v - init;
        const pct = init > 0 ? (profit / init) * 100 : 0;
        const cls = colorClass(pct);
        body += `<div class="row"><span class="k">${x.name}</span>` +
                `<span class="v ${cls}">${fmtPct(pct)}` +
                `<span class="sub">${fmtSignedWon(profit)}</span></span></div>`;
      });
      if (c.key === 'IRP') {
        const sig = irpSignal(last);
        const act = irpActual(last);
        if (sig > 0) {
          const diffPct = ((act - sig) / sig) * 100;
          let tag;
          if (Math.abs(diffPct) < 0.005) tag = '동일';
          else if (diffPct > 0) tag = '초과수익';
          else tag = '미달';
          body += `<div class="diff-row"><span class="k">실제 vs 시그널</span>` +
                  `<span class="v ${colorClass(diffPct)}">${fmtPct(diffPct)} ${tag}</span></div>`;
        }
      }
    } else {
      body += `<div class="value neutral">${fmtWon(a.initial || 0)}</div>` +
              `<div class="row"><span class="k">상태</span><span class="v">데이터 수집 중</span></div>`;
    }
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = body;
    wrap.appendChild(el);
  });
}

function renderProfitTable(wrapId, records, accs, mode) {
  // 합계 = totalActual 차이 → IRP 시그널 자동 제외
  const initials = initialColsOf(accs);
  const initialTotal =
    (accs.ISA?.initial || 0) +
    (accs.Pension?.initial || 0) +
    (accs.IRP?.initial || 0);

  const rows = records.map((r, i) => {
    const cur = colsOf(r);
    if (mode === 'cumulative') {
      const profitCols = cur.map((v, j) => v - initials[j]);
      const profitTotal = totalActual(r) - initialTotal;
      return { date: r.date, cols: profitCols, total: profitTotal };
    } else {
      if (i === 0) {
        return { date: r.date, cols: [0,0,0,0,0,0], total: 0 };
      }
      const prev = records[i - 1];
      const prv = colsOf(prev);
      const profitCols = cur.map((v, j) => v - prv[j]);
      const profitTotal = totalActual(r) - totalActual(prev);
      return { date: r.date, cols: profitCols, total: profitTotal };
    }
  });

  rows.sort((a, b) => b.date.localeCompare(a.date)); // 내림차순

  let html = `<table>
    <thead><tr>
      <th>날짜</th>
      <th>ISA Hybrid</th>
      <th>ISA Smart</th>
      <th>연금 Hybrid</th>
      <th>연금 Smart</th>
      <th>IRP 실제</th>
      <th class="col-irp-signal">IRP 시그널</th>
      <th>합계</th>
    </tr></thead><tbody>`;
  rows.forEach(row => {
    html += `<tr><td>${row.date}</td>`;
    row.cols.forEach((v, i) => {
      const extraClass = (i === 5) ? ' col-irp-signal' : '';
      html += `<td class="${colorClass(v)}${extraClass}">${fmtSignedWon(v)}</td>`;
    });
    html += `<td class="${colorClass(row.total)}"><strong>${fmtSignedWon(row.total)}</strong></td>`;
    html += `</tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById(wrapId).innerHTML = html;
}

const chartOpts = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color: '#e8e8f0', font: { size: 14 } } },
    tooltip: { callbacks: { label: c => c.dataset.label + ': ' + c.parsed.y.toFixed(2) + '%' } }
  },
  scales: {
    x: { ticks: { color: '#8a8aa3', font: { size: 12 } }, grid: { color: '#2a3656' } },
    y: { ticks: { color: '#8a8aa3', font: { size: 12 }, callback: v => v.toFixed(1) + '%' }, grid: { color: '#2a3656' } }
  }
};

let strategyChart = null, accountChart = null;

function renderStrategyChart(labels, hybridActual, smart) {
  const ctx = document.getElementById('strategyChart').getContext('2d');
  if (strategyChart) strategyChart.destroy();
  strategyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Hybrid',     data: hybridActual,
          borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.10)',
          tension: 0.3, fill: false, borderWidth: 2.5 },
        { label: 'SmartSplit', data: smart,
          borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.10)',
          tension: 0.3, fill: false, borderWidth: 2.5 }
      ]
    },
    options: chartOpts
  });
}

function renderAccountChart(labels, isa, pension, irpAct, irpSig) {
  const ctx = document.getElementById('accountChart').getContext('2d');
  if (accountChart) accountChart.destroy();
  accountChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'ISA',         data: isa,     borderColor: '#fbbf24', tension: 0.3, borderWidth: 2 },
        { label: '연금',        data: pension, borderColor: '#a78bfa', tension: 0.3, borderWidth: 2 },
        { label: 'IRP 실제',    data: irpAct,  borderColor: '#fb923c', tension: 0.3, borderWidth: 2.5 },
        { label: 'IRP 시그널',  data: irpSig,  borderColor: '#fb923c', borderDash: [6, 4], tension: 0.3, borderWidth: 1.5, pointRadius: 2 }
      ]
    },
    options: chartOpts
  });
}

load();
</script>
</body>
</html>
